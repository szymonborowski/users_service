services:
  users-app:
    container_name: users-app
    build:
      context: .
      dockerfile: docker/dev/php/Dockerfile
      target: php-runtime
      args:
        UID: ${UID}
        GID: ${GID}
    command: php-fpm
    volumes:
      - ./src:/var/www/html
    depends_on:
      - users-db
    expose:
      - "9000"
    networks:
      - users-internal
      - microservices

  users-nginx:
    container_name: users-nginx
    image: nginx:1.27
    volumes:
      - ./src:/var/www/html
      - ./docker/dev/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - users-app
    networks:
      - users-internal
      - microservices

  users-db:
    container_name: users-db
    image: mysql:8
    ports:
      - "127.0.0.1:3307:3306"
    environment:
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    volumes:
      - sso_db_data:/var/lib/mysql
    networks:
      - users-internal

networks:
  users-internal:
    driver: bridge
  microservices:
    external: true

volumes:
  sso_db_data: