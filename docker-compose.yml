services:
  users-app:
    container_name: users-app
    build:
      context: .
      dockerfile: docker/dev/php/Dockerfile
      target: php-runtime
      args:
        UID: ${UID}
        GID: ${GID}
    command: php-fpm
    environment:
      DB_HOST: users-db
      DB_CONNECTION: ${DB_CONNECTION}
      DB_PORT: ${DB_PORT}
      DB_DATABASE: ${DB_DATABASE}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    volumes:
      - ./src:/var/www/html
    depends_on:
      - users-db
    expose:
      - "9000"
    networks:
      - users-internal

  users-nginx:
    container_name: users-nginx
    image: nginx:1.27
    volumes:
      - ./src:/var/www/html
      - ./docker/dev/nginx/default.conf:/etc/nginx/conf.d/default.conf
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.users.rule=Host(`${APP_DOMAIN}`)"
      - "traefik.http.routers.users.entrypoints=websecure"
      - "traefik.http.routers.users.tls=true"
      - "traefik.http.services.users.loadbalancer.server.port=80"
    depends_on:
      - users-app
    networks:
      - users-internal
      - web

  users-db:
    container_name: users-db
    image: mysql:8
    ports:
      - "127.0.0.1:3307:3306"
    environment:
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    volumes:
      - sso_db_data:/var/lib/mysql
    networks:
      - users-internal

networks:
  users-internal:
    driver: bridge
  web:
    external: true

volumes:
  sso_db_data: